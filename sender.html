<!doctype html>
<meta charset="utf-8">
<title>BA4 QR Sender</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: monospace;
    text-align: center;
  }
  h1 { margin: 16px 0 8px; }
  button, input {
    font: inherit;
    font-size: 16px;
    padding: 8px 14px;
    margin: 4px;
  }
  button { cursor: pointer; }
  #qr-wrapper {
    display: inline-block;
    background: white;
    padding: 32px; /* Quiet Zone */
    border-radius: 10px;
    margin-top: 14px;
  }
  #qr {
    width: 520px;
    height: 520px;
    background: white;
  }
  #info {
    margin: 10px auto;
    max-width: 780px;
    font-size: 17px;
    white-space: pre-wrap;
  }
</style>
<body>
  <h1>BA4 QR Sender</h1>

  <button id="metaBtn">SEND META</button>
  <button id="startBtn">START</button>
  <button id="stopBtn">STOP</button>
  <button id="resetBtn">RESET</button>
  <label>Start frame <input id="frameInput" type="number" value="0" min="0" style="width:90px"></label>

  <br>
  <div id="qr-wrapper"><div id="qr"></div></div>
  <div id="info">Ready</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="frames-ba4.js"></script>
  <script>
    const qrBox = document.getElementById("qr");
    const info = document.getElementById("info");
    const metaBtn = document.getElementById("metaBtn");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resetBtn = document.getElementById("resetBtn");
    const frameInput = document.getElementById("frameInput");

    let frame = 0;
    let timer = null;
    let lastTick = performance.now();

    const intervalMs = 1000 / BA4_META.fps;

    function packetMeta() {
      return `M|${BA4_META.width}|${BA4_META.height}|${BA4_META.fps}|${BA4_META.title}`;
    }

    function packetFrame(i, realFps) {
      const f = BA4_FRAMES[i];
      const start = f[0];
      const rle = f[1];
      const fps10 = Math.max(0, Math.min(999, Math.round(realFps * 10)));
      return `F|${i}|${start}|${rle}|${fps10}`;
    }

    function drawQr(text) {
      qrBox.innerHTML = "";
      new QRCode(qrBox, {
        text,
        width: 520,
        height: 520,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.L
      });
    }

    function sendMeta() {
      const p = packetMeta();
      drawQr(p);
      info.textContent =
        `META sent\n${p}\n` +
        `frames:${BA4_META.frames} size:${BA4_META.width}x${BA4_META.height} target:${BA4_META.fps}fps`;
    }

    function tick() {
      const now = performance.now();
      const realFps = 1000 / Math.max(1, now - lastTick);
      lastTick = now;

      const p = packetFrame(frame, realFps);

      try {
        drawQr(p);
        info.textContent =
          `FRAME sent\n` +
          `frame:${frame + 1}/${BA4_FRAMES.length}\n` +
          `target:${BA4_META.fps}fps real:${realFps.toFixed(2)}fps\n` +
          `payload:${p.length} chars`;
      } catch (e) {
        info.textContent = `QR error: ${e.message}\npayload:${p.length} chars\nframe:${frame}`;
      }

      frame = (frame + 1) % BA4_FRAMES.length;
      frameInput.value = frame;
    }

    function start() {
      if (timer) return;
      frame = Math.max(0, Math.min(BA4_FRAMES.length - 1, Number(frameInput.value || 0)));
      lastTick = performance.now();
      tick();
      timer = setInterval(tick, intervalMs);
    }

    function stop() {
      if (!timer) return;
      clearInterval(timer);
      timer = null;
      info.textContent += "\nStopped";
    }

    function reset() {
      stop();
      frame = 0;
      frameInput.value = 0;
      qrBox.innerHTML = "";
      info.textContent = "Ready";
    }

    metaBtn.onclick = sendMeta;
    startBtn.onclick = start;
    stopBtn.onclick = stop;
    resetBtn.onclick = reset;

    sendMeta();
  </script>
</body>
